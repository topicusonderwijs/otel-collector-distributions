dist:
  name: otelcol-splunk
  description: OTel Collector Splunk HEC
  output_path: ./dist
  version: 0.2.0 # x-release-please-version
extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/healthcheckextension v0.155.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/pprofextension v0.156.0
exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.157.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/splunkhecexporter v0.154.0
processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.155.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.155.0
receivers:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/filelogreceiver v0.154.0
connectors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/countconnector v0.154.0
providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.62.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.62.0
